<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronomètre</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .chrono-container {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
            width: 100%;
            max-width: 400px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chrono-container h1 {
            margin-bottom: 25px;
            color: #2a5298;
            font-size: 28px;
            font-weight: 600;
        }

        #display {
            font-size: 52px;
            font-weight: 700;
            margin: 30px 0;
            color: #222;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 18px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 56px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
        }

        .start {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .stop {
            background: linear-gradient(135deg, #dc3545, #fd7e14);
            color: white;
        }

        .reset {
            background: linear-gradient(135deg, #6c757d, #495057);
            color: white;
        }

        /* تصميم للأجهزة الصغيرة جداً */
        @media (max-width: 360px) {
            .chrono-container {
                padding: 20px;
                border-radius: 15px;
                min-height: 320px;
            }
            
            .chrono-container h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }
            
            #display {
                font-size: 44px;
                margin: 25px 0;
                padding: 12px;
            }
            
            button {
                padding: 16px;
                font-size: 15px;
                min-height: 50px;
            }
        }
        
        /* تصميم للأجهزة المتوسطة والكبيرة */
        @media (min-width: 768px) {
            .chrono-container {
                max-width: 450px;
                padding: 35px;
                min-height: 400px;
            }
            
            .chrono-container h1 {
                font-size: 32px;
                margin-bottom: 30px;
            }
            
            #display {
                font-size: 64px;
                margin: 35px 0;
                padding: 20px;
            }
            
            .buttons {
                flex-direction: row;
                gap: 15px;
            }
            
            button {
                flex: 1;
                padding: 18px 10px;
            }
        }
        
        /* تصميم للأجهزة الأفقية */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 10px;
            }
            
            .chrono-container {
                min-height: 280px;
                padding: 20px;
                flex-direction: row;
                align-items: center;
                max-width: 700px;
                gap: 30px;
            }
            
            .chrono-container h1 {
                margin-bottom: 0;
                font-size: 24px;
                flex: 1;
            }
            
            #display {
                margin: 0;
                font-size: 40px;
                flex: 2;
            }
            
            .buttons {
                flex-direction: column;
                flex: 1;
                margin-top: 0;
                gap: 10px;
            }
            
            button {
                min-height: 45px;
                padding: 12px;
            }
        }
        
        /* تأثيرات إضافية للتفاعل */
        .start:hover, .stop:hover, .reset:hover {
            opacity: 0.9;
        }
        
        /* تحسينات للأجهزة التي تدعم hover */
        @media (hover: hover) {
            button:hover {
                opacity: 0.9;
                transform: translateY(-1px);
            }
        }
        
        /* لمسة نهائية للأنيميشن */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        .chrono-container {
            animation: pulse 0.5s ease;
        }
    </style>
</head>
<body>

<div class="chrono-container">
    <h1>⏱️ Chronomètre</h1>
    <div id="display">00:00:00</div>

    <div class="buttons">
        <button class="start" onclick="start()" aria-label="Démarrer le chronomètre">▶️ Démarrer</button>
        <button class="stop" onclick="stop()" aria-label="Arrêter le chronomètre">⏸️ Stop</button>
        <button class="reset" onclick="reset()" aria-label="Réinitialiser le chronomètre">🔄 Réinitialiser</button>
    </div>
</div>

<script>
    let seconds = 0;
    let minutes = 0;
    let hours = 0;
    let timer = null;
    let isRunning = false;

    function updateDisplay() {
        let h = hours < 10 ? "0" + hours : hours;
        let m = minutes < 10 ? "0" + minutes : minutes;
        let s = seconds < 10 ? "0" + seconds : seconds;
        document.getElementById("display").innerText = `${h}:${m}:${s}`;
    }

    function start() {
        if (isRunning) return;
        
        isRunning = true;
        timer = setInterval(() => {
            seconds++;
            if (seconds === 60) {
                seconds = 0;
                minutes++;
            }
            if (minutes === 60) {
                minutes = 0;
                hours++;
            }
            updateDisplay();
        }, 1000);
        
        // تغيير لون المؤقت عندما يكون نشطاً
        document.getElementById("display").style.borderColor = "#28a745";
        document.getElementById("display").style.color = "#28a745";
    }

    function stop() {
        if (!isRunning) return;
        
        clearInterval(timer);
        isRunning = false;
        
        // تغيير لون المؤشر عندما يكون متوقفاً
        document.getElementById("display").style.borderColor = "#dc3545";
        document.getElementById("display").style.color = "#dc3545";
    }

    function reset() {
        stop();
        seconds = 0;
        minutes = 0;
        hours = 0;
        updateDisplay();
        
        // إعادة الألوان الأصلية
        document.getElementById("display").style.borderColor = "#e9ecef";
        document.getElementById("display").style.color = "#222";
    }
    

    document.addEventListener('DOMContentLoaded', updateDisplay);
</script>

</body>
</html>
